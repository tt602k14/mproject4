<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTD GYM - Test Đăng Ký</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #6FCF97 0%, #4CAF50 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 {
            font-size: 28px;
            margin-bottom: 5px;
        }
        .header p {
            font-size: 14px;
            opacity: 0.9;
        }
        .form-container {
            padding: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #4CAF50;
        }
        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #6FCF97 0%, #4CAF50 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(76, 175, 80, 0.3);
        }
        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        .message {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        .message.success {
            background: #e8f5e9;
            color: #2e7d32;
            border: 1px solid #4CAF50;
        }
        .message.error {
            background: #ffebee;
            color: #c62828;
            border: 1px solid #f44336;
        }
        .message.show {
            display: block;
        }
        .response-box {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }
        .response-box.show {
            display: block;
        }
        .response-box pre {
            margin: 0;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-size: 12px;
            color: #333;
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .tab {
            flex: 1;
            padding: 10px;
            background: #f5f5f5;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s;
        }
        .tab.active {
            background: #4CAF50;
            color: white;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏋️ HTD GYM</h1>
            <p>Test Đăng Ký & Đăng Nhập</p>
        </div>
        
        <div class="form-container">
            <div class="tabs">
                <button class="tab active" onclick="switchTab('register')">Đăng Ký</button>
                <button class="tab" onclick="switchTab('login')">Đăng Nhập</button>
            </div>

            <div id="message" class="message"></div>
            
            <!-- Register Form -->
            <div id="register-tab" class="tab-content active">
                <form id="registerForm" onsubmit="handleRegister(event)">
                    <div class="form-group">
                        <label>Họ tên *</label>
                        <input type="text" name="full_name" placeholder="Nguyễn Văn A" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Email *</label>
                        <input type="email" name="email" placeholder="test@gmail.com" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Số điện thoại</label>
                        <input type="tel" name="phone" placeholder="0123456789">
                    </div>
                    
                    <div class="form-group">
                        <label>Mật khẩu * (tối thiểu 6 ký tự)</label>
                        <input type="password" name="password" placeholder="******" required minlength="6">
                    </div>
                    
                    <button type="submit" class="btn" id="registerBtn">ĐĂNG KÝ</button>
                </form>
            </div>

            <!-- Login Form -->
            <div id="login-tab" class="tab-content">
                <form id="loginForm" onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label>Email *</label>
                        <input type="email" name="username" placeholder="test@gmail.com" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Mật khẩu *</label>
                        <input type="password" name="password" placeholder="******" required>
                    </div>
                    
                    <button type="submit" class="btn" id="loginBtn">ĐĂNG NHẬP</button>
                </form>
            </div>

            <div id="response" class="response-box">
                <strong>Response từ API:</strong>
                <pre id="responseText"></pre>
            </div>
        </div>
    </div>

    <script>
        function switchTab(tab) {
            // Update tabs
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            
            if (tab === 'register') {
                document.querySelectorAll('.tab')[0].classList.add('active');
                document.getElementById('register-tab').classList.add('active');
            } else {
                document.querySelectorAll('.tab')[1].classList.add('active');
                document.getElementById('login-tab').classList.add('active');
            }
            
            // Hide message and response
            hideMessage();
            hideResponse();
        }

        function showMessage(text, type) {
            const messageEl = document.getElementById('message');
            messageEl.textContent = text;
            messageEl.className = 'message ' + type + ' show';
        }

        function hideMessage() {
            document.getElementById('message').classList.remove('show');
        }

        function showResponse(data) {
            document.getElementById('responseText').textContent = JSON.stringify(data, null, 2);
            document.getElementById('response').classList.add('show');
        }

        function hideResponse() {
            document.getElementById('response').classList.remove('show');
        }

        async function handleRegister(e) {
            e.preventDefault();
            
            const btn = document.getElementById('registerBtn');
            btn.disabled = true;
            btn.textContent = 'Đang xử lý...';
            
            hideMessage();
            hideResponse();
            
            const formData = new FormData(e.target);
            const data = {
                action: 'register',
                full_name: formData.get('full_name'),
                username: formData.get('email'),
                email: formData.get('email'),
                phone: formData.get('phone'),
                password: formData.get('password')
            };
            
            try {
                const response = await fetch('api/auth.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                showResponse(result);
                
                if (result.success) {
                    showMessage('✅ Đăng ký thành công! Tài khoản đã được lưu vào MySQL.', 'success');
                    e.target.reset();
                } else {
                    showMessage('❌ ' + result.message, 'error');
                }
            } catch (error) {
                showMessage('❌ Lỗi kết nối: ' + error.message, 'error');
                showResponse({ error: error.message });
            } finally {
                btn.disabled = false;
                btn.textContent = 'ĐĂNG KÝ';
            }
        }

        async function handleLogin(e) {
            e.preventDefault();
            
            const btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.textContent = 'Đang xử lý...';
            
            hideMessage();
            hideResponse();
            
            const formData = new FormData(e.target);
            const data = {
                action: 'login',
                username: formData.get('username'),
                password: formData.get('password')
            };
            
            try {
                const response = await fetch('api/auth.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                showResponse(result);
                
                if (result.success) {
                    showMessage('✅ Đăng nhập thành công!', 'success');
                } else {
                    showMessage('❌ ' + result.message, 'error');
                }
            } catch (error) {
                showMessage('❌ Lỗi kết nối: ' + error.message, 'error');
                showResponse({ error: error.message });
            } finally {
                btn.disabled = false;
                btn.textContent = 'ĐĂNG NHẬP';
            }
        }
    </script>
</body>
</html>
